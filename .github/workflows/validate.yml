name: Validate scaffold

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python tools/validate_scaffold.py
      - run: python -m unittest discover -s tests -v
      - run: pip install ruff==0.15.6
      - run: ruff check .
